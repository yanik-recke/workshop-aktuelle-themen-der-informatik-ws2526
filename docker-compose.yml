  #   command: python download_pdfs.py
  #   profiles:
  #     - setup

  # indexing:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: fh-wedel-indexing
  #   depends_on:
  #     qdrant:
  #       condition: service_healthy
  #   volumes:
  #     - ./rag-code/data_fh_wedel:/app/rag-code/data_fh_wedel
  #     - ./rag-code:/app/rag-code
  #   environment:
  #     - OPENAI_API_KEY=${OPENAI_API_KEY:-dummy}
  #     - OPENAI_BASE_URL=${OPENAI_BASE_URL:-http://ollama:11434/v1}
  #     - QDRANT_URL=http://qdrant:6333
  #   command: python indexing_pipeline.py
  #   profiles:
  #     - setup

volumes:
  qdrant_data:
    driver: local
  mongodb_data:
    driver: local
