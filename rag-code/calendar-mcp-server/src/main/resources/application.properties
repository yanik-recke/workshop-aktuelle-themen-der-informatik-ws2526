# Application name
spring.application.name=calendar-mcp-server

# MCP Server Configuration
spring.ai.mcp.server.name=calendar-mcp-server
spring.ai.mcp.server.version=1.0.0

# Use STDIO transport for MCP communication
spring.ai.mcp.server.stdio=true

# Calendar ICS file path (can be overridden via command line or environment variable)
# Example: calendar.ics.file.path=/path/to/your/calendar.ics
calendar.ics.file.path=

# Logging configuration
logging.level.com.example.calendar=INFO
logging.level.org.springframework.ai=INFO

# Disable banner for cleaner STDIO output
spring.main.banner-mode=off

# Disable web server (STDIO mode doesn't need it)
spring.main.web-application-type=none
